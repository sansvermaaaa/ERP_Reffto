<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refftonix Drone Labs — Internal ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --purple-primary:#7B2FC4;
  --purple-secondary:#D24FF0;
  --purple-dark:#2D0A4E;
  --canvas-dark:#160429;
  --gold:#F5B800;
  --gold-light:#FFD54F;
  --bg-light:#EDE6F7;
  --success:#1E9E6B;
  --danger:#D14343;
  --glass:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.09);
  --glass-strong:rgba(255,255,255,0.08);
  --text-hi:#F4EEFB;
  --text-mid:#C9B9E3;
  --text-low:#8A76AC;
  --radius:16px;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:
    radial-gradient(1200px 700px at 85% -10%, rgba(210,79,240,0.16), transparent 60%),
    radial-gradient(900px 600px at -10% 110%, rgba(123,47,196,0.18), transparent 60%),
    var(--canvas-dark);
  color:var(--text-hi);
  min-height:100vh;
  overflow-x:hidden;
}
::selection{background:var(--purple-secondary);color:#fff;}
a{color:inherit;}
button{font-family:var(--font-body);cursor:pointer;border:none;}
input,select,textarea{font-family:var(--font-body);}

.mono{font-family:var(--font-mono);}

/* ---------- Glass primitives ---------- */
.glass{
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-radius:var(--radius);
}
.glass-strong{
  background:var(--glass-strong);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-radius:var(--radius);
}

/* ---------- Brand mark ---------- */
.brand-badge{
  width:40px;height:40px;border-radius:11px;
  background:linear-gradient(135deg,var(--purple-primary),var(--purple-secondary));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:19px;color:#fff;
  box-shadow:0 4px 18px rgba(123,47,196,0.45);
  flex-shrink:0;
}
.brand-row{display:flex;align-items:center;gap:12px;}
.brand-word{font-family:var(--font-display);font-weight:600;font-size:16px;letter-spacing:0.2px;}
.brand-word small{display:block;font-family:var(--font-body);font-weight:500;font-size:10.5px;color:var(--text-low);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px;}

/* ---------- Buttons ---------- */
.btn{
  padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:600;
  transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  display:inline-flex;align-items:center;gap:8px;white-space:nowrap;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--purple-primary),var(--purple-secondary));color:#fff;box-shadow:0 6px 20px rgba(123,47,196,0.35);}
.btn-primary:hover{box-shadow:0 8px 26px rgba(210,79,240,0.45);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#2D1B00;box-shadow:0 6px 18px rgba(245,184,0,0.3);}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--text-hi);border:1px solid var(--glass-border);}
.btn-ghost:hover{background:rgba(255,255,255,0.11);}
.btn-danger{background:rgba(209,67,67,0.15);color:#ff9d9d;border:1px solid rgba(209,67,67,0.4);}
.btn-danger:hover{background:rgba(209,67,67,0.25);}
.btn-success{background:rgba(30,158,107,0.15);color:#7EE7BE;border:1px solid rgba(30,158,107,0.4);}
.btn-success:hover{background:rgba(30,158,107,0.25);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn[disabled]{opacity:0.4;cursor:not-allowed;}
.btn-block{width:100%;justify-content:center;}

/* ---------- Login screen ---------- */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;
}
.login-wrap::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:42px 42px;
  mask-image:radial-gradient(circle at 50% 40%, black, transparent 75%);
}
.login-card{
  width:100%;max-width:400px;padding:38px 34px 32px;position:relative;z-index:1;
  animation:cardIn .6s cubic-bezier(.16,1,.3,1);
}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.98);}to{opacity:1;transform:none;}}
.login-header{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;margin-bottom:30px;}
.login-badge{width:56px;height:56px;border-radius:15px;font-size:26px;}
.login-title{font-family:var(--font-display);font-size:21px;font-weight:700;}
.login-sub{color:var(--text-low);font-size:12.5px;letter-spacing:1.6px;text-transform:uppercase;margin-top:2px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-mid);margin-bottom:7px;letter-spacing:0.3px;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 14px;border-radius:10px;
  background:rgba(255,255,255,0.045);border:1px solid var(--glass-border);
  color:var(--text-hi);font-size:14px;outline:none;transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--purple-secondary);}
.field input::placeholder,.field textarea::placeholder{color:var(--text-low);}
.field select option{background:#241040;color:var(--text-hi);}
.login-error{
  background:rgba(209,67,67,0.12);border:1px solid rgba(209,67,67,0.35);color:#ff9d9d;
  font-size:12.5px;padding:10px 13px;border-radius:10px;margin-bottom:16px;display:none;
}
.login-error.show{display:block;}
.login-foot{margin-top:18px;text-align:center;font-size:11.5px;color:var(--text-low);}

/* Dev switcher */
.dev-switcher{
  position:fixed;top:16px;right:16px;z-index:500;padding:11px 13px;
  display:flex;align-items:center;gap:8px;
}
.dev-switcher span{font-size:10px;font-weight:700;letter-spacing:1.4px;color:var(--gold-light);text-transform:uppercase;}
.dev-switcher select{
  background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);color:var(--text-hi);
  padding:6px 9px;border-radius:8px;font-size:12px;outline:none;
}
.dev-switcher select option{background:#241040;}

/* ---------- App shell ---------- */
.app{display:none;min-height:100vh;}
.app.active{display:flex;}
.sidebar{
  width:236px;flex-shrink:0;min-height:100vh;padding:22px 16px;
  background:rgba(22,4,41,0.55);border-right:1px solid var(--glass-border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.sidebar-brand{padding:6px 8px 22px;border-bottom:1px solid var(--glass-border);margin-bottom:18px;}
.nav-group{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text-low);padding:0 10px;margin:14px 0 8px;font-weight:700;}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;
  color:var(--text-mid);font-size:13.5px;font-weight:500;cursor:pointer;margin-bottom:3px;
  transition:background .15s, color .15s;
}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text-hi);}
.nav-item.active{background:linear-gradient(135deg,rgba(123,47,196,0.35),rgba(210,79,240,0.2));color:#fff;box-shadow:inset 0 0 0 1px rgba(210,79,240,0.3);}
.nav-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0.6;flex-shrink:0;}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--glass-border);}
.role-pill{
  font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;background:rgba(245,184,0,0.15);color:var(--gold-light);
  border:1px solid rgba(245,184,0,0.3);display:inline-block;
}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  padding:16px 30px;display:flex;align-items:center;justify-content:space-between;gap:20px;
  border-bottom:1px solid var(--glass-border);position:sticky;top:0;background:rgba(22,4,41,0.65);
  backdrop-filter:blur(14px);z-index:10;
}
.view-title{font-family:var(--font-display);font-size:19px;font-weight:600;}
.view-sub{font-size:12px;color:var(--text-low);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.user-chip{display:flex;align-items:center;gap:9px;padding:6px 12px 6px 6px;border-radius:30px;}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--purple-primary),var(--purple-secondary));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.user-chip-name{font-size:12.5px;font-weight:600;}
.user-chip-role{font-size:10px;color:var(--text-low);}

.announce-bar{
  padding:9px 30px;font-size:12.5px;display:flex;align-items:center;gap:10px;
  background:linear-gradient(90deg,rgba(245,184,0,0.13),rgba(245,184,0,0.03));
  border-bottom:1px solid rgba(245,184,0,0.2);color:var(--gold-light);
}
.announce-bar b{color:#fff;}

.content{padding:26px 30px 60px;flex:1;}

/* ---------- Generic content bits ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{padding:18px 20px;}
.stat-num{font-family:var(--font-display);font-size:28px;font-weight:700;}
.stat-label{font-size:11.5px;color:var(--text-low);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

.panel{padding:22px 24px;margin-bottom:20px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.panel-title{font-family:var(--font-display);font-size:15.5px;font-weight:600;}
.panel-title span{display:block;font-family:var(--font-body);font-size:11.5px;color:var(--text-low);font-weight:400;margin-top:3px;}

table{width:100%;border-collapse:collapse;}
th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.9px;
  color:var(--text-low);padding:0 12px 10px;font-weight:700;
}
td{padding:12px;font-size:13px;border-top:1px solid var(--glass-border);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,0.02);}
.table-wrap{overflow-x:auto;}

.badge{padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;display:inline-block;}
.badge-active{background:rgba(30,158,107,0.15);color:#7EE7BE;}
.badge-inactive{background:rgba(138,118,172,0.18);color:var(--text-mid);}
.badge-pending{background:rgba(245,184,0,0.15);color:var(--gold-light);}
.badge-approved{background:rgba(30,158,107,0.15);color:#7EE7BE;}
.badge-rejected{background:rgba(209,67,67,0.15);color:#ff9d9d;}
.badge-admin{background:rgba(245,184,0,0.15);color:var(--gold-light);}
.badge-hr{background:rgba(210,79,240,0.15);color:#f0a8ff;}
.badge-employee{background:rgba(123,47,196,0.18);color:#c9a3f0;}
.badge-project_head{background:rgba(30,158,107,0.15);color:#7EE7BE;}

.empty-state{
  text-align:center;padding:50px 20px;color:var(--text-low);
}
.empty-icon{
  width:56px;height:56px;border-radius:50%;margin:0 auto 16px;
  border:2px dashed rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:22px;
}
.empty-state p{font-size:13.5px;margin-bottom:16px;}

.pill-btn{
  padding:5px 11px;border-radius:8px;font-size:11.5px;font-weight:600;background:rgba(255,255,255,0.06);
  color:var(--text-hi);border:1px solid var(--glass-border);margin-right:5px;transition:background .15s;
}
.pill-btn:hover{background:rgba(255,255,255,0.12);}
.pill-btn.danger{color:#ff9d9d;border-color:rgba(209,67,67,0.35);}
.pill-btn.gold{color:var(--gold-light);border-color:rgba(245,184,0,0.35);}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:720px){.grid-2{grid-template-columns:1fr;}}

/* progress bar */
.progress-track{width:100%;height:7px;border-radius:20px;background:rgba(255,255,255,0.07);overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--purple-primary),var(--gold));border-radius:20px;}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(9,2,18,0.65);backdrop-filter:blur(4px);
  display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:5vh 16px;overflow-y:auto;
}
.modal-overlay.show{display:flex;}
.modal-box{width:100%;max-width:520px;padding:26px;position:relative;animation:cardIn .35s ease;}
.modal-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,0.06);color:var(--text-hi);font-size:15px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:rgba(255,255,255,0.13);}
.modal-title{font-family:var(--font-display);font-size:17px;font-weight:600;margin-bottom:20px;padding-right:30px;}

/* ID Card */
.id-card{
  width:340px;border-radius:18px;padding:22px;position:relative;overflow:hidden;
  background:linear-gradient(155deg,var(--purple-dark) 0%, var(--canvas-dark) 60%);
  border:1px solid rgba(210,79,240,0.35);
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}
.id-card::after{
  content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(210,79,240,0.35),transparent 70%);
}
.id-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;position:relative;z-index:1;}
.id-card-name{font-family:var(--font-display);font-size:19px;font-weight:700;margin-bottom:2px;position:relative;z-index:1;}
.id-card-role{font-size:11.5px;color:var(--gold-light);text-transform:uppercase;letter-spacing:1px;font-weight:700;position:relative;z-index:1;}
.id-card-meta{margin-top:18px;font-family:var(--font-mono);font-size:11px;color:var(--text-mid);position:relative;z-index:1;}
.id-card-meta div{margin-bottom:5px;display:flex;justify-content:space-between;}
.id-card-meta div span:first-child{color:var(--text-low);}
.id-card-strip{margin-top:18px;height:5px;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--purple-secondary));position:relative;z-index:1;}

/* Radar (signature element) */
.radar-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 10px 6px;}
.radar{width:210px;height:210px;position:relative;border-radius:50%;
  background:radial-gradient(circle, rgba(123,47,196,0.12), rgba(22,4,41,0.4) 70%);
  border:1px solid rgba(210,79,240,0.25);}
.radar-ring{position:absolute;border-radius:50%;border:1px solid rgba(210,79,240,0.25);}
.radar-center{position:absolute;top:50%;left:50%;width:10px;height:10px;margin:-5px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold);}
.radar-sweep{
  position:absolute;top:50%;left:50%;width:50%;height:2px;transform-origin:left center;
  background:linear-gradient(90deg, rgba(210,79,240,0.9), transparent);
  animation:sweep 3s linear infinite;
}
@keyframes sweep{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.radar-user{position:absolute;width:12px;height:12px;border-radius:50%;transform:translate(-50%,-50%);transition:all .4s ease;}
.radar-user.inside{background:var(--success);box-shadow:0 0 14px var(--success);}
.radar-user.outside{background:var(--danger);box-shadow:0 0 14px var(--danger);}
.radar-status{margin-top:16px;text-align:center;}
.radar-status .dist{font-family:var(--font-mono);font-size:22px;font-weight:700;}
.radar-status .label{font-size:11.5px;color:var(--text-low);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

.alert{padding:12px 15px;border-radius:10px;font-size:13px;margin-top:14px;display:none;}
.alert.show{display:block;}
.alert-danger{background:rgba(209,67,67,0.14);border:1px solid rgba(209,67,67,0.35);color:#ff9d9d;}
.alert-success{background:rgba(30,158,107,0.14);border:1px solid rgba(30,158,107,0.35);color:#7EE7BE;}

.accordion-item{border-top:1px solid var(--glass-border);padding:12px 4px;}
.accordion-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:13.5px;font-weight:600;}
.accordion-body{margin-top:10px;font-size:12.5px;color:var(--text-mid);display:none;}
.accordion-body.open{display:block;}

.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:2000;display:flex;flex-direction:column;gap:10px;}
.toast{padding:13px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,0.35);animation:toastIn .3s ease;max-width:320px;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.toast-success{background:linear-gradient(135deg,#1E9E6B,#177d54);color:#fff;}
.toast-error{background:linear-gradient(135deg,#D14343,#a53434);color:#fff;}
.toast-info{background:linear-gradient(135deg,var(--purple-primary),var(--purple-secondary));color:#fff;}

.offer-letter{
  background:#fff;color:#1a1a1a;padding:44px;border-radius:6px;font-family:var(--font-body);
  max-width:640px;margin:0 auto;
}
.offer-letter h2{font-family:var(--font-display);color:var(--purple-primary);}
.offer-letter .ol-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;border-bottom:2px solid var(--purple-primary);padding-bottom:16px;}
.offer-letter p{font-size:13.5px;line-height:1.7;margin-bottom:12px;color:#2a2a2a;}
.offer-letter table{margin:18px 0;}
.offer-letter td{border:1px solid #ddd;color:#222;font-size:12.5px;}
.offer-letter th{color:#777;}

@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{position:absolute;top:0;left:0;width:100%;}
}

.scroll-thin::-webkit-scrollbar{width:7px;height:7px;}
.scroll-thin::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:10px;}

.checkbox-row{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:6px 0;}
.checkbox-row input{width:auto;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.form-row{grid-template-columns:1fr;}}

.divider{height:1px;background:var(--glass-border);margin:18px 0;}
</style>
</head>
<body>

<div id="devSwitcher" class="dev-switcher glass"></div>
<div id="loginRoot"></div>
<div id="appRoot" class="app"></div>
<div id="modalRoot"></div>
<div id="toastRoot" class="toast-wrap"></div>

<script>
/* =========================================================================
   REFFTONIX DRONE LABS — INTERNAL ERP
   Single-file prototype. Data layer isolated behind DB.* so swapping the
   localStorage-backed store for live Supabase calls later only touches
   the functions inside the DB object.
   ========================================================================= */

const STORAGE_KEY = 'reffto_erp_state_v1';
const SESSION_KEY = 'reffto_erp_session_v1';

/* ---------------- Supabase ---------------- */
const SUPABASE_URL = 'https://hdwshsoqsuxuoxilcxor.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhkd3Noc29xc3V4dW94aWxjeG9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODM2ODksImV4cCI6MjA5OTc1OTY4OX0.AJUQ6Qnm678YAz3-H5XYPzbWAN2Yx4QJzLRCgFqNW58';
const supabaseClient = (window.supabase && SUPABASE_URL.startsWith('https://'))
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

/* profiles table <-> app object field mapping (snake_case in Postgres, camelCase in JS) */
function profileToRow(p){
  return {
    id: p.id, full_name: p.fullName, email: p.email, password: p.password,

/* ---------------- data access module (swap-ready for Supabase) ---------------- */
const DB = {
  profiles: {
    // list/get read the local mirror synchronously so existing render code
    // doesn't need to change; create/update/delete/refresh talk to Supabase
    // and then keep the mirror (and the localStorage backup) in sync.
    list: () => appState.profiles,
    get: (id) => appState.profiles.find(p => p.id === id),
    async refresh(){
      if(!supabaseClient) return;
      const { data, error } = await supabaseClient.from('profiles').select('*').order('created_at', { ascending:true });
      if(error){ toast('Could not load profiles: ' + error.message, 'error'); return; }
      appState.profiles = (data || []).map(rowToProfile);
      saveState();
    },
    async create(data){
      const rec = { id: uid('emp'), createdAt: Date.now(), isActive: true, ...data };
      if(supabaseClient){
        const { error } = await supabaseClient.from('profiles').insert(profileToRow(rec));
        if(error){ toast('Supabase error: ' + error.message, 'error'); throw error; }
      }
      appState.profiles.push(rec);
      saveState();
      return rec;
    },
    async update(id, patch){
      const rec = DB.profiles.get(id);
      if(!rec) return null;
      Object.assign(rec, patch);
      if(supabaseClient){
        const { error } = await supabaseClient.from('profiles').update(profileToRow(rec)).eq('id', id);
        if(error){ toast('Supabase error: ' + error.message, 'error'); throw error; }
      }
      saveState();
      return rec;
    },
    async delete(id){
      if(supabaseClient){
        const { error } = await supabaseClient.from('profiles').delete().eq('id', id);
        if(error){ toast('Supabase error: ' + error.message, 'error'); throw error; }
      }
      appState.profiles = appState.profiles.filter(p => p.id !== id);
      saveState();
    }
  },
  attendance: {
    list: () => appState.attendance,
    forProfile: (id) => appState.attendance.filter(a => a.profileId === id),
    create: (data) => { const rec = { id: uid('att'), ...data }; appState.attendance.push(rec); saveState(); return rec; }
  },
  projects: {
    list: () => appState.projects,
    get: (id) => appState.projects.find(p => p.id === id),
    create: (data) => { const rec = { id: uid('prj'), teamIds: [], phases: [], status:'active', ...data }; appState.projects.push(rec); saveState(); return rec; },
    update: (id, patch) => { const rec = DB.projects.get(id); if(!rec) return null; Object.assign(rec, patch); saveState(); return rec; },
    delete: (id) => { appState.projects = appState.projects.filter(p => p.id !== id); saveState(); }
  },
  phases: {
    list: () => appState.phases,
    forProject: (projectId) => appState.phases.filter(ph => ph.projectId === projectId),
    create: (data) => { const rec = { id: uid('ph'), progress:0, ...data }; appState.phases.push(rec); saveState(); return rec; },
    update: (id, patch) => { const rec = appState.phases.find(p=>p.id===id); if(!rec) return null; Object.assign(rec, patch); saveState(); return rec; }
  },
  financialClaims: {
    list: () => appState.financialClaims,
    forProfile: (id) => appState.financialClaims.filter(c => c.profileId === id),
    create: (data) => { const rec = { id: uid('clm'), status:'pending', date: Date.now(), ...data }; appState.financialClaims.push(rec); saveState(); return rec; },
    update: (id, patch) => { const rec = appState.financialClaims.find(c=>c.id===id); if(!rec) return null; Object.assign(rec, patch); saveState(); return rec; }
  },
  hrTickets: {
    list: () => appState.hrTickets,
    forProfile: (id) => appState.hrTickets.filter(t => t.profileId === id),
    create: (data) => { const rec = { id: uid('tkt'), status:'open', date: Date.now(), ...data }; appState.hrTickets.push(rec); saveState(); return rec; },
    update: (id, patch) => { const rec = appState.hrTickets.find(t=>t.id===id); if(!rec) return null; Object.assign(rec, patch); saveState(); return rec; }
  },
  announcements: {
    list: () => appState.announcements.sort((a,b)=>b.date-a.date),
    create: (data) => { const rec = { id: uid('ann'), date: Date.now(), ...data }; appState.announcements.push(rec); saveState(); return rec; },
    delete: (id) => { appState.announcements = appState.announcements.filter(a => a.id !== id); saveState(); }
  },
  requirements: {
    list: () => appState.requirements,
    create: (data) => { const rec = { id: uid('req'), status:'pending', date: Date.now(), ...data }; appState.requirements.push(rec); saveState(); return rec; },
    update: (id, patch) => { const rec = appState.requirements.find(r=>r.id===id); if(!rec) return null; Object.assign(rec, patch); saveState(); return rec; }
  },
  leaves: {
    list: () => appState.leaves,
    forProfile: (id) => appState.leaves.filter(l => l.profileId === id),
    create: (data) => { const rec = { id: uid('lv'), status:'pending', date: Date.now(), ...data }; appState.leaves.push(rec); saveState(); return rec; },
    update: (id, patch) => { const rec = appState.leaves.find(l=>l.id===id); if(!rec) return null; Object.assign(rec, patch); saveState(); return rec; }
  }
};

function fmtDate(ts){ if(!ts) return '—'; const d = new Date(ts); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtTime(ts){ if(!ts) return '—'; const d = new Date(ts); return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }
function fmtDateTime(ts){ return fmtDate(ts) + ' · ' + fmtTime(ts); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){ return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

function haversineDistance(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

async function submitConfigure(e, id){
  e.preventDefault();
  const d = processForm('configure', e.target);
  const p = DB.profiles.get(id);
  const wasActive = p.isActive;
  const patch = { fullName:d.fullName, designation:d.designation, baseSalary:Number(d.baseSalary)||0, shiftStart:d.shiftStart, shiftEnd:d.shiftEnd, workLocation:d.workLocation };
  if(!wasActive){ patch.password = d.password; patch.isActive = true; }
  try{
    await DB.profiles.update(id, patch);
    closeModal(); renderView();
    if(!wasActive){
      toast('Activated — offer letter ready','success');
      openOfferLetter(id);
    } else {
      toast('Employee updated','success');
    }
  }catch(err){ /* toast already shown */ }
  return false;
}

  if(!confirm('Terminate this account and purge user data?')) return;
  try{
    await DB.profiles.delete(id);
    renderView();

  }catch(err){ /* toast already shown */ }
}

function viewAttendanceMark(){
  const p = currentProfile();
  const anchor = GEOFENCE_ANCHORS[p?.workLocation || 'reffto'];
  return `
  <div class="glass panel" style="max-width:520px;margin:0 auto;">
    <div class="panel-title" style="text-align:center;margin-bottom:4px;">${esc(anchor.name)}</div>
    <div style="text-align:center;font-size:11.5px;color:var(--text-low);margin-bottom:6px;">Geofence radius: ${GEOFENCE_RADIUS_M}m</div>
    <div class="radar-wrap">
      <div class="radar" id="radarEl">
        <div class="radar-ring" style="width:100%;height:100%;top:0;left:0;"></div>
        <div class="radar-ring" style="width:66%;height:66%;top:17%;left:17%;"></div>
        <div class="radar-ring" style="width:33%;height:33%;top:33.5%;left:33.5%;"></div>
        <div class="radar-center"></div>
        <div class="radar-sweep"></div>
        <div class="radar-user" id="radarUser" style="display:none;"></div>
      </div>
      <div class="radar-status" id="radarStatus">
        <div class="dist">—</div>
        <div class="label">Awaiting location</div>
      </div>
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:8px;" onclick="runGeofenceCheck()">Mark Attendance</button>
    <div class="alert" id="geoAlert"></div>
  </div>
  <div class="glass panel" style="max-width:520px;margin:20px auto 0;">
    <div class="panel-title" style="margin-bottom:10px;">My Recent Punches</div>
    ${DB.attendance.forProfile(p?p.id:'').length===0 ? emptyState('No entries recorded.', "Your clock-ins will appear here.") :
      [...DB.attendance.forProfile(p.id)].sort((a,b)=>b.timestamp-a.timestamp).slice(0,6).map(a=>`
      <div style="display:flex;justify-content:space-between;padding:9px 0;border-top:1px solid var(--glass-border);font-size:12.5px;">
        <span class="mono">${fmtDateTime(a.timestamp)}</span>
        <span>${a.valid ? '<span class="badge badge-active">Valid</span>' : '<span class="badge badge-rejected">Out of Range</span>'}</span>
      </div>`).join('')}
  </div>`;
}
function initRadar(){ /* radar sweep animates via CSS only; user dot placed after geolocation resolves */ }

function runGeofenceCheck(){
  const p = currentProfile();
  const alertEl = document.getElementById('geoAlert');
  alertEl.className = 'alert';
  if(!navigator.geolocation){
    alertEl.textContent = 'Geolocation is not supported on this device.';
    alertEl.classList.add('show','alert-danger');
    return;
  }
  const anchorKey = p?.workLocation || 'reffto';
  const anchor = GEOFENCE_ANCHORS[anchorKey];

  navigator.geolocation.getCurrentPosition(function(position){
    const { latitude, longitude } = position.coords;
    const distance = haversineDistance(latitude, longitude, anchor.lat, anchor.lng);
    updateRadarUI(distance);

    const isValid = distance <= GEOFENCE_RADIUS_M;
    DB.attendance.create({
      profileId: p.id,
      timestamp: Date.now(),
      location: anchorKey,
      distance: distance,
      valid: isValid
    });

    if(isValid){
      alertEl.textContent = `Checked in — ${Math.round(distance)}m from ${anchor.name}.`;
      alertEl.classList.add('show','alert-success');
      toast('Attendance marked','success');
    } else {
      alertEl.textContent = `Check-in locked — you are ${Math.round(distance)}m from ${anchor.name}, outside the ${GEOFENCE_RADIUS_M}m geofence.`;
      alertEl.classList.add('show','alert-danger');
      toast('Outside geofence range','error');
    }
    renderView();
  }, function(err){
    alertEl.textContent = 'Could not read your location: ' + err.message;
    alertEl.classList.add('show','alert-danger');
  }, { enableHighAccuracy:true, timeout:10000 });
}
function updateRadarUI(distance){
  const dot = document.getElementById('radarUser');
  const status = document.getElementById('radarStatus');
  if(!dot || !status) return;
  const inside = distance <= GEOFENCE_RADIUS_M;
  const clamped = Math.min(distance / 400, 1);
  const angle = Math.random() * Math.PI * 2;
  const r = clamped * 46;
  const x = 50 + r * Math.cos(angle);
  const y = 50 + r * Math.sin(angle);
  dot.style.display = 'block';
  dot.style.left = x + '%';
  dot.style.top = y + '%';
  dot.className = 'radar-user ' + (inside ? 'inside' : 'outside');
  status.querySelector('.dist').textContent = Math.round(distance) + 'm';
  status.querySelector('.label').textContent = inside ? 'Inside geofence' : 'Outside geofence';
}
